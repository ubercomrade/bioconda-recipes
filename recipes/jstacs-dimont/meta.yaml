{% set name = "jstacs-dimont" %}
{% set version = "2.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Jstacs/Jstacs/archive/refs/tags/v{{ version }}.tar.gz
  sha256: b93a3ea2e4b84e1fddfd5f53bc179e8c0da4f1f1a8e84afd23b18069bfaa124c

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - openjdk >=11,<18
  run:
    - openjdk >=11,<18

test:
  commands:
    - jstacs-dimont 2>&1 | grep -Ei "Dimont|Extract|Motif|Tool"

about:
  home: https://www.jstacs.de/index.php/Dimont
  license: GPL-3.0-or-later
  summary: Discriminative de-novo motif discovery tools from Jstacs
  description: |
    Jstacs Dimont tools for discriminative de-novo motif discovery from
    high-throughput data, including Dimont-related prediction and scanning
    utilities.
  identifiers:
    - doi:10.1093/nar/gkt831

extra:
  recipe-maintainers:
    - ubercomrade
