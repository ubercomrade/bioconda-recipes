{% set name = "chipmunk" %}
{% set version = "8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://autosome.org/ChIPMunk/chipmunk_v{{ version }}.jar
  sha256: 1dc81253be3dd016eff39a58d8ae142d9b6cccf1317a402596ae84715fd00b57

build:
  number: 0
  noarch: generic

requirements:
  run:
    - openjdk >=8

test:
  commands:
    - java -version
    - chipmunk --help
    - dichipmunk --help
    - chiphorde --help
    - test -s "${PREFIX}/share/chipmunk-8-0/chipmunk.jar"

about:
  home: https://autosome.org/ChIPMunk/
  license: WTFPL AND Apache-2.0 AND LGPL
  license_file: LICENSE
  summary: Fast Java motif discovery tool for ChIP-Seq, HT-SELEX, DNase footprints, and related sequence data.
  description: |
    ChIPMunk is a DNA/RNA motif discovery tool distributed as a compiled Java JAR.
    This package installs command-line wrappers for ChIPMunk, diChIPMunk, and ChIPHorde.

extra:
  skip-lints:
    - missing_run_exports
  identifiers:
    - biotools:chipmunk
    - doi:10.1093/bioinformatics/btq488
    - doi:10.1142/S0219720013400040
  recipe-maintainers:
    - ubercomrade
