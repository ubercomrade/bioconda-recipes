{% set name = "customtkinter" %}
{% set version = "6.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/customtkinter-{{ version }}.tar.gz
  sha256: c782df167bc64ab3fc3140286df06967ac2de4dcc97dd5958426fe9c1a98057b

build:
  script: "{{ PYTHON }} -m pip install . --no-deps -vvv"
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python
    - darkdetect
    - typing-extensions  # [py<=37]
    - xorg-libx11
    - packaging

test:
  imports:
    - customtkinter
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://customtkinter.tomschimansky.com
  summary: Create modern looking GUIs with Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ypriverol
