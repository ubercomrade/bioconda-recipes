{% set name = "octopusv" %}
{% set version = "0.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/octopusv-{{ version }}.tar.gz
  sha256: 45cd7de284a9557fe4ce70952af40e8e545009494cc45cb43d23a424ec570449

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - poetry-core
    - pip
  run:
    - python >=3.10
    - typer >=0.12.3
    - loguru >=0.7.2
    - rich >=13.7.1
    - natsort >=8.4.0
    - pytest-cov >=4.1.0
    - matplotlib-base >=3.9.2
    - seaborn >=0.13.2
    - jinja2 >=3.1.5
    - bcftools
    - pycirclize >=1.10.1
    - htslib

test:
  imports:
    - octopusv
  commands:
    - octopusv --help

about:
  home: "https://github.com/ylab-hi/octopusV"
  summary: "OctopusV: Advanced Structural Variant Analysis Toolkit."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/ylab-hi/octopusV"

extra:
  recipe-maintainers:
    - qingxiangguo
