{% set version = "1.1.0" %}

package:
  name: novae
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/novae/novae-{{ version }}.tar.gz
  sha256: 1c551cc801c120930b343ebba533d40e086c576dd08aa6aef5500e57f70a5561

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  number: 0
  run_exports:
    - {{ pin_subpackage('novae', max_pin="x") }}

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - scanpy >=1.9.8
    - lightning >=2.2.1
    - pytorch >=2.2.1
    - pytorch_geometric >=2.5.2
    - huggingface_hub >=0.32.0
    - safetensors >=0.4.3
    - pandas >=2.0.0
    - python-igraph >=1.0.0
    - fast-array-utils >=1.3.1

test:
  imports:
    - novae

about:
  home: https://prism-oncology.github.io/novae/
  summary: Graph-based foundation model for spatial transcriptomics data
  doc_url: https://prism-oncology.github.io/novae/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - quentinblampey
