{% set version = "1.5.0" %}

package:
  name: decodiphy
  version: {{ version }}

source:
  url: https://github.com/shayesteh99/DecoDiPhy/archive/v{{ version }}.tar.gz
  sha256: 94eb4a4625390e78d83de5234bfe3646867861306b0e14808a0b10e3c10bab47

build:
  number: 0
  noarch: python
  entry_points:
    - decodiphy = decodiphy.__main__:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('decodiphy', max_pin="x") }}

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - setuptools >=42
    - wheel
    - numpy >=2,<3
    - scipy >=1.13
  run:
    - python >=3.9,<3.13
    - numpy >=2,<3
    - scipy >=1.13
    - cvxpy >=1.5,<2
    - treeswift >=1.1.0,<2.0
    - osqp >=1.1,<2

test:
  imports:
    - decodiphy
  commands:
    - decodiphy --help
    - python -c "import numpy, scipy, cvxpy"

about:
  home: "https://github.com/shayesteh99/DecoDiPhy"
  license: MIT
  license_file: LICENSE
  summary: "DecoDiPhy: a Python tool for consolidating millions of sequence reads into few accurate phylogenetic placements."
  dev_url: "https://github.com/shayesteh99/DecoDiPhy"

extra:
  recipe-maintainers:
    - shayesteh99
