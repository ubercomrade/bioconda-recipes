{% set name = "salmon" %}
{% set version = "2.2.1" %}
{% set sha256 = "1154d077101d647df2dab8bb0819377b9dffc7b473bba749a8475feb524ca91a" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/COMBINE-lab/salmon/archive/refs/tags/v{{ version }}.tar.gz
    sha256: {{ sha256 }}

build:
  number: 0
  # The 2.0 binary is the Rust build; it does NOT read C++ (pufferfish) indices.
  run_exports:
    - {{ pin_subpackage("salmon", max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}        # mimalloc vendors a small C allocator
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
  host: []
  run: []

test:
  commands:
    - salmon --version
    - salmon --help
    - salmon index --help
    - salmon quant --help

about:
  home: "https://github.com/COMBINE-lab/salmon"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Highly-accurate & wicked fast transcript-level quantification from RNA-seq reads (salmon 2.0, Rust)."
  dev_url: "https://github.com/COMBINE-lab/salmon"
  doc_url: "https://combine-lab.github.io/salmon"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - rob-p
    - k3yavi
    - mjsteinbaugh
  identifiers:
    - biotools:salmon
    - usegalaxy-eu:salmon
    - usegalaxy-eu:salmonquantmerge
    - doi:10.1038/nmeth.4197
  notes: |
    salmon 2.0 is a from-scratch Rust rewrite of the C++ tool. It uses a new
    index format and CANNOT read C++ (pufferfish) indices — rebuild indices with
    2.0. quant.sf and the inferential-replicate outputs remain compatible with
    tximport/fishpond/swish. The final C++ release (1.12.0) is packaged
    separately as `salmon-cpp` for reproducibility. Single-cell quantification
    moved to the alevin-fry ecosystem.
