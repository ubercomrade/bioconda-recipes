{% set version = "2.0.1" %}

package:
  name: assemblytics
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/a/assemblytics/assemblytics-{{ version }}.tar.gz
  sha256: 1d28654899eb2c3537d0268c44d909c183c3d2236c17f408dcc8d87418958ee0

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"
  run_exports:
    - {{ pin_subpackage("assemblytics", max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy
    - pandas
    - matplotlib-base

test:
  commands:
    - assemblytics --help
    - python -c "open('/tmp/test.delta','w').write('/ref/genome.fna /query/assembly.fna\nNUCMER\n>chr1 ctg1 100000 99900\n1 50000 1 50000 0 0 0\n0\n50101 100000 50001 99900 0 0 0\n0\n')"
    - assemblytics -d /tmp/test.delta -o /tmp/assemblytics_test_out -l 10 -min 50 -max 10000
    - test -s /tmp/assemblytics_test_out/assemblytics_structural_variants.bed

about:
  home: https://marianattestad.github.io/assemblytics/
  license: MIT
  license_family: MIT
  summary: Detect and analyze structural variants from a de novo genome assembly aligned to a reference genome
  doc_url: https://github.com/MariaNattestad/assemblytics
  dev_url: https://github.com/MariaNattestad/assemblytics

extra:
  recipe-maintainers:
    - MariaNattestad
