{% set repo = "repermulize" %}
{% set name = "repermulize" %}
{% set version = "1.1.2" %}
{% set sha256 = "3e292dffbcad9dda79f5f69d120e4342598ed1cc1d46b8aa37b9aaa7ce9b4e2e" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/pbradleylab/{{ repo }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin = "x.x") }}

requirements:
  host:
    - r-base >=4.5.3
    - r-ape =5.8_1
    - r-castor =1.8.5
    - r-dplyr =1.2.1
    - r-future =1.70.0
    - r-mass =7.3_65
    - r-pbapply =1.7_4
    - r-phylolm =2.6.5
    - r-purrr =1.2.2
    - r-settings =0.2.7
    - r-tibble =3.3.1
  run:
    - r-base >=4.5.3
    - r-ape =5.8_1
    - r-castor =1.8.5
    - r-dplyr =1.2.1
    - r-future =1.70.0
    - r-mass =7.3_65
    - r-pbapply =1.7_4
    - r-phylolm =2.6.5
    - r-purrr =1.2.2
    - r-settings =0.2.7
    - r-tibble =3.3.1
test:
  commands:
    - '$R -e "library(repermulize)"'

about:
  home: "https://github.com/pbradleylab/repermulize"
  dev_url: "https://github.com/pbradleylab/repermulize/"
  license: MIT
  license_family: MIT
  summary: "Repermulize contains functions to perform gene-to-phenotype tests with permulation."

extra:
  recipe-maintainers:
    - kekananen
